<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rainchecking</title>

<style>
{
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#overlay {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 24px;
  letter-spacing: 4px;
  background: rgba(0,0,0,0.15);
  cursor: pointer;
  z-index: 10;
  transition: opacity 1s ease;
}

.hidden {
  opacity: 0;
  pointer-events: none;
}
</style>
</head>
<body>

<video id="bgVideo" loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<div id="overlay">click to enter</div>

<script>
const overlay = document.getElementById("overlay");
const video = document.getElementById("bgVideo");

video.pause();
video.currentTime = 0;

overlay.addEventListener("click", async () => {
  overlay.classList.add("hidden");

  video.muted = false;
  video.play();
});
</script>

</body>
</html>
